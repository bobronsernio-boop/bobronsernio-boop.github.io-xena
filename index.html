<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XENA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@2.0.67-alpha.2/dist/scramjet.all.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'monospace'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #000000; color: #ffffff; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
    .browser-ui { background-color: #050505; border-bottom: 1px solid #111111; }
    .search-glow:focus-within { border-color: #222222 !important; }
    .tab-active { background-color: #000000; border: 1px solid #111111; border-bottom: 1px solid #000000; color: #ffffff; }
    iframe { width: 100%; height: 100%; border: none; background: #ffffff; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="flex flex-col select-none">

  <!-- Minimal Header -->
  <header class="browser-ui pt-2 shrink-0 z-30">
    <div class="flex items-center px-3">
      <div class="flex items-center gap-1 overflow-x-auto" id="tab-container">
        <button onclick="createNewTab()" class="flex items-center justify-center w-6 h-6 rounded bg-zinc-900/40 hover:bg-zinc-800/80 text-zinc-500 hover:text-white transition self-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    </div>

    <!-- Controls & Blank Omnibox -->
    <div class="flex items-center h-9 px-3 bg-[#050505] gap-3 border-t border-[#111111]">
      <div class="flex items-center gap-1">
        <button onclick="handleNavigation('back')" class="w-6 h-6 flex items-center justify-center rounded hover:bg-zinc-900 text-zinc-500 hover:text-zinc-200 transition">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button onclick="handleNavigation('forward')" class="w-6 h-6 flex items-center justify-center rounded hover:bg-zinc-900 text-zinc-500 hover:text-zinc-200 transition">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <button onclick="handleNavigation('reload')" class="w-6 h-6 flex items-center justify-center rounded hover:bg-zinc-900 text-zinc-500 hover:text-zinc-200 transition">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
        </button>
      </div>

      <!-- Blank Omnibox with DDG search capabilities -->
      <div class="flex-1 flex items-center h-6 rounded bg-black border border-[#151515] search-glow transition">
        <input type="text" id="chrome-url-bar" placeholder="" spellcheck="false" autocomplete="off" class="w-full px-3 text-xs bg-transparent outline-none text-zinc-300 font-mono" onkeydown="if(event.key === 'Enter') launchProxyUrl(this.value)">
      </div>
    </div>
  </header>

  <!-- Content Workspace Viewport -->
  <main class="flex-1 relative bg-[#000000]" id="frames-viewport">
    
    <!-- Clean Homepage View -->
    <div id="homepage-view" class="absolute inset-0 flex flex-col items-center justify-center bg-[#000000] z-10 p-6">
      <div class="max-w-xl w-full flex flex-col items-center space-y-8">
        
        <h1 class="text-5xl font-light tracking-[0.3em] text-white font-mono uppercase">XENA</h1>

        <!-- Search Bar Only -->
        <div class="w-full flex h-10 rounded border border-[#151515] bg-black overflow-hidden search-glow transition">
          <input type="text" id="search-input" placeholder="v2 coming soon..." spellcheck="false" autocomplete="off" class="flex-1 bg-transparent px-4 text-xs outline-none text-white font-mono placeholder-zinc-700" onkeydown="if(event.key === 'Enter') handleHomeAction(this.value)">
          <button onclick="handleHomeAction(document.getElementById('search-input').value)" class="px-4 text-[10px] text-zinc-400 hover:text-white border-l border-[#151515] bg-zinc-950/40 hover:bg-zinc-900 transition tracking-widest uppercase">Go</button>
        </div>

      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
